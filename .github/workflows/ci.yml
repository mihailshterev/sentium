name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "24"
  BUILD_CONFIGURATION: "Release"

jobs:
  dotnet-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire Workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Run Tests
        run: dotnet test --no-build --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal

  react-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/clients/sentium-portal
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "./src/clients/sentium-portal/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test with Coverage
        run: pnpm run test:coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-coverage-report
          path: ./src/clients/sentium-portal/coverage

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [dotnet-build-test, react-build-test]
    timeout-minutes: 45

    env:
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      PLAYWRIGHT_BASE_URL: "http://localhost:5173"
      CI: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire Workload
        run: dotnet workload install aspire

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET (Release)
        run: dotnet build --no-restore --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "./e2e/pnpm-lock.yaml"

      - name: Install E2E dependencies
        working-directory: ./e2e
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/pnpm-lock.yaml') }}

      - name: Install Playwright browsers + OS deps
        working-directory: ./e2e
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright OS deps (cache hit)
        working-directory: ./e2e
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Run Playwright E2E tests
        working-directory: ./e2e
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ./e2e/playwright-report
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: ./e2e/test-results
          retention-days: 14
